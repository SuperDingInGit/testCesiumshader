<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cesium 河流仿真 — Shadertoy 移植版</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.97/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.97/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, #cesiumContainer { width: 100%; height: 100%; overflow: hidden; }
        #panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(10, 14, 28, 0.92); backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 14px;
            padding: 20px 22px; color: #e0e6f0;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            z-index: 1000; min-width: 290px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.45);
        }
        #panel h2 {
            font-size: 17px; font-weight: 700; margin-bottom: 6px;
            background: linear-gradient(135deg, #4da8da, #7dd3fc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        #panel .subtitle { font-size: 11px; color: #7f8ba0; margin-bottom: 16px; }
        #panel label {
            display: flex; align-items: center; justify-content: space-between;
            font-size: 12px; margin-bottom: 10px; color: #b0bdd0;
        }
        #panel input[type="range"] {
            -webkit-appearance: none; width: 120px; height: 5px;
            border-radius: 3px; background: rgba(255,255,255,0.12); outline: none;
        }
        #panel input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 18px; height: 18px;
            border-radius: 50%; background: #4da8da;
            cursor: pointer; border: 2px solid #1e2a3a;
        }
        .slider-val { font-size: 11px; color: #7dd3fc; min-width: 36px; text-align: right; }
        #panel button {
            width: 100%; margin-top: 6px; padding: 8px 0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 8px;
            background: rgba(255,255,255,0.05); color: #c8d4e4;
            font-size: 12px; cursor: pointer; transition: all 0.2s;
        }
        #panel button:hover {
            background: rgba(77,168,218,0.18); border-color: rgba(77,168,218,0.4);
        }
        .section-title {
            font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
            color: #4da8da; margin: 16px 0 10px 0; border-top: 1px solid rgba(255,255,255,0.06);
            padding-top: 12px;
        }
        #status {
            position: absolute; bottom: 20px; left: 20px;
            background: rgba(0,0,0,0.8); padding: 8px 14px; border-radius: 6px;
            font-size: 12px; color: #7dd3fc; font-family: monospace; z-index: 1000;
            max-width: 500px;
        }
        #legend {
            position: absolute; bottom: 30px; right: 30px;
            background: rgba(10,14,28,0.88); backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
            padding: 14px 18px; color: #8899aa; font-size: 11px;
            font-family: 'PingFang SC', sans-serif; z-index: 1000; line-height: 1.8;
        }
        .dot { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>

    <div id="panel">
        <h2>🌊 河流仿真</h2>
        <div class="subtitle">Shadertoy 移植 · P_Malin 算法</div>

        <div class="section-title">🌊 水面参数</div>
        <label>流速 <span class="slider-val" id="valSpeed">1.0x</span></label>
        <input type="range" id="flowSpeed" min="0.1" max="3" step="0.1" value="1">
        <label>湍流强度 <span class="slider-val" id="valTurbulence">0.7</span></label>
        <input type="range" id="turbulence" min="0" max="1.5" step="0.05" value="0.7">
        <label>波浪幅度 <span class="slider-val" id="valWave">0.6</span></label>
        <input type="range" id="waveAmp" min="0" max="1" step="0.05" value="0.6">

        <div class="section-title">🎨 颜色</div>
        <label>水深 <span class="slider-val" id="valDepth">0.55</span></label>
        <input type="range" id="waterDepth" min="0.2" max="1.2" step="0.05" value="0.55">
        <label>透明度 <span class="slider-val" id="valAlpha">0.85</span></label>
        <input type="range" id="alpha" min="0.3" max="1" step="0.05" value="0.85">
        <label>泡沫量 <span class="slider-val" id="valFoam">0.6</span></label>
        <input type="range" id="foamAmount" min="0" max="1.5" step="0.05" value="0.6">

        <button onclick="flyToRiver()">📷 飞到三峡峡谷</button>
        <button onclick="flyLowAngle()">🎥 低角度观察</button>
        <button onclick="flyTopDown()">🔝 俯瞰视角</button>
    </div>

    <div id="status">初始化中...</div>
    <div id="legend">
        <div><span class="dot" style="background:#01060f;"></span> 深水区</div>
        <div><span class="dot" style="background:#0a3050;"></span> 中层水</div>
        <div><span class="dot" style="background:#1a6080;"></span> 浅水区</div>
        <div><span class="dot" style="background:#d0e8f0;"></span> 泡沫</div>
    </div>

    <script>
    (function() {
        const statusEl = document.getElementById('status');
        function log(msg) { console.log('[3D-River]', msg); statusEl.textContent = msg; }

        log('初始化 Cesium...');

        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIxNzY3MjZlMi0xNTgyLTQ0NmMtOGUxOC1kY2RlMTlhOGNiOGYiLCJpZCI6Mzc3MzAsImlhdCI6MTY2MTQxMjg5M30.1QRdCE8ul5AzeUgD_WhkdTqcUJHZqiXVhkGeL80Vqfw';

        const viewer = new Cesium.Viewer('cesiumContainer', {
            animation: false, timeline: false, baseLayerPicker: false,
            geocoder: false, homeButton: false, sceneModePicker: false,
            navigationHelpButton: false, fullscreenButton: false,
            infoBox: false, selectionIndicator: false,
        });

        viewer.scene.globe.enableLighting = true;
        viewer.scene.globe.showGroundAtmosphere = true;
        viewer.scene.globe.depthTestAgainstTerrain = true;
        log('Cesium Viewer 就绪');

        // ============================================================
        // 河流着色器 — 移植自 Shadertoy "Where the River Goes" by P_Malin
        //
        // 核心技术：
        // 1. SmoothNoise_DXY — 解析导数噪声（精确且快速）
        // 2. FBM_DXY — 带流动平流的 FBM（每八度反转流向）
        // 3. SampleFlowingNormal — 双采样流混合（无缝循环动画）
        // 4. SampleWaterFoam — 基于流速的泡沫
        // 5. GetWaterExtinction — 水体消散色
        // 6. Tonemap — 电影级色调映射
        // ============================================================

        var glslSource = [
            // === P_Malin 的 Hash 函数 (Dave Hoskins) ===
            '#define MOD2 vec2(4.438975,3.972973)',
            '',
            'float Hash( float p ) {',
            '    vec2 p2 = fract(vec2(p) * MOD2);',
            '    p2 += dot(p2.yx, p2.xy+19.19);',
            '    return fract(p2.x * p2.y);',
            '}',
            '',
            'vec2 Hash2( float p ) {',
            '    vec3 p3 = fract(vec3(p) * vec3(.1031, .1030, .0973));',
            '    p3 += dot(p3, p3.yzx + 19.19);',
            '    return fract((p3.xx+p3.yz)*p3.zy);',
            '}',
            '',
            // === SmoothNoise (P_Malin) ===
            'float SmoothNoise(in vec2 o) {',
            '    vec2 p = floor(o);',
            '    vec2 f = fract(o);',
            '    float n = p.x + p.y*57.0;',
            '    float a = Hash(n+0.0);',
            '    float b = Hash(n+1.0);',
            '    float c = Hash(n+57.0);',
            '    float d = Hash(n+58.0);',
            '    vec2 f2 = f * f;',
            '    vec2 f3 = f2 * f;',
            '    vec2 t = 3.0 * f2 - 2.0 * f3;',
            '    float res = a + (b-a)*t.x + (c-a)*t.y + (a-b+d-c)*t.x*t.y;',
            '    return res;',
            '}',
            '',
            // === SmoothNoise_DXY — 带解析导数 (P_Malin 的关键创新) ===
            'vec3 SmoothNoise_DXY(in vec2 o) {',
            '    vec2 p = floor(o);',
            '    vec2 f = fract(o);',
            '    float n = p.x + p.y*57.0;',
            '    float a = Hash(n+0.0);',
            '    float b = Hash(n+1.0);',
            '    float c = Hash(n+57.0);',
            '    float d = Hash(n+58.0);',
            '    vec2 f2 = f * f;',
            '    vec2 f3 = f2 * f;',
            '    vec2 t = 3.0 * f2 - 2.0 * f3;',
            '    vec2 dt = 6.0 * f - 6.0 * f2;',
            '    float u = t.x; float v = t.y;',
            '    float du = dt.x; float dv = dt.y;',
            '    float res = a + (b-a)*u + (c-a)*v + (a-b+d-c)*u*v;',
            '    float dx = (b-a)*du + (a-b+d-c)*du*v;',
            '    float dy = (c-a)*dv + (a-b+d-c)*u*dv;',
            '    return vec3(dx, dy, res);',
            '}',
            '',
            // === FBM_DXY — 带流动平流的 FBM (P_Malin 核心算法) ===
            '// flow: 流速向量, ps: persistence, df: 域扭曲强度',
            '// 返回 vec3(dx, dy, value) — 导数 + 值',
            'vec3 FBM_DXY( vec2 p, vec2 flow, float ps, float df ) {',
            '    vec3 f = vec3(0.0);',
            '    float tot = 0.0;',
            '    float a = 1.0;',
            '    for( int i=0; i<4; i++) {',
            '        p += flow;',
            '        flow *= -0.75;',  // 每层反转流向 — 产生干涉图案
            '        vec3 v = SmoothNoise_DXY( p );',
            '        f += v * a;',
            '        p += v.xy * df;',  // 域扭曲
            '        p *= 2.0;',
            '        tot += a;',
            '        a *= ps;',
            '    }',
            '    return f / tot;',
            '}',
            '',
            // === SampleWaterNormal — 水面法线采样 (P_Malin) ===
            '// vUV: 纹理坐标, vFlowOffset: 流速偏移, fMag: 法线强度, fFoam: 泡沫量',
            'vec4 SampleWaterNormal( vec2 vUV, vec2 vFlowOffset, float fMag, float fFoam ) {',
            '    float fScale = 1.0;',  // 简化：不用 dFdx/dFdy',
            '    fScale = max(0.25, 1.0 - fFoam * 5.0);',  // 泡沫处法线趋平',
            '    float fGradientAscent = 0.25 + (fFoam * -1.5);',
            '    vec3 dxy = FBM_DXY(vUV * 20.0, vFlowOffset * 20.0, 0.75 + fFoam * 0.25, fGradientAscent);',
            '    vec3 vBlended = mix( vec3(0.0, 1.0, 0.0), normalize( vec3(dxy.x, fMag, dxy.y) ), fScale );',
            '    return vec4( normalize( vBlended ), dxy.z * fScale );',
            '}',
            '',
            // === SampleWaterFoam — 泡沫纹理采样 (P_Malin) ===
            'float SampleWaterFoam( vec2 vUV, vec2 vFlowOffset, float fFoam ) {',
            '    float f = FBM_DXY(vUV * 30.0, vFlowOffset * 50.0, 0.8, -0.5 ).z;',
            '    float fAmount = 0.2;',
            '    f = max( 0.0, (f - fAmount) / fAmount );',
            '    return pow( 0.5, f );',
            '}',
            '',
            // === SampleFlowingNormal — 双采样流混合 (P_Malin 核心技巧) ===
            '// 两个时间偏移的采样，用三角权重混合 → 无缝循环动画',
            'vec4 SampleFlowingNormal( vec2 vUV, vec2 vFlowRate, float fFoam, float time, out float fOutFoamTex ) {',
            '    float fMag = 2.5 / (1.0 + dot( vFlowRate, vFlowRate ) * 5.0);',
            '    float t0 = fract( time );',
            '    float t1 = fract( time + 0.5 );',
            '    float i0 = floor( time );',
            '    float i1 = floor( time + 0.5 );',
            '    float o0 = t0 - 0.5;',
            '    float o1 = t1 - 0.5;',
            '    vec2 vUV0 = vUV + Hash2(i0);',
            '    vec2 vUV1 = vUV + Hash2(i1);',
            '    vec4 sample0 = SampleWaterNormal( vUV0, vFlowRate * o0, fMag, fFoam );',
            '    vec4 sample1 = SampleWaterNormal( vUV1, vFlowRate * o1, fMag, fFoam );',
            '    float weight = abs( t0 - 0.5 ) * 2.0;',
            '    float foam0 = SampleWaterFoam( vUV0, vFlowRate * o0 * 0.25, fFoam );',
            '    float foam1 = SampleWaterFoam( vUV1, vFlowRate * o1 * 0.25, fFoam );',
            '    vec4 result = mix( sample0, sample1, weight );',
            '    result.xyz = normalize(result.xyz);',
            '    fOutFoamTex = mix( foam0, foam1, weight );',
            '    return result;',
            '}',
            '',
            // === GetWaterExtinction — 水体消散色 (P_Malin) ===
            'vec3 GetWaterExtinction( float dist ) {',
            '    float fOpticalDepth = dist * 6.0;',
            '    vec3 vExtinctCol = 1.0 - vec3(0.5, 0.4, 0.1);',
            '    return exp2( -fOpticalDepth * vExtinctCol );',
            '}',
            '',
            // === Tonemap — 电影级色调映射 (P_Malin) ===
            'vec3 Tonemap( vec3 x ) {',
            '    float a = 0.010; float b = 0.132; float c = 0.010; float d = 0.163; float e = 0.101;',
            '    return ( x * ( a * x + b ) ) / ( x * ( c * x + d ) + e );',
            '}',
            '',
            // === GetFresnel — 菲涅尔反射 (P_Malin) ===
            'vec3 GetFresnel( vec3 vView, vec3 vNormal, vec3 vR0, float fGloss ) {',
            '    float NdotV = max( 0.0, dot( vView, vNormal ) );',
            '    return vR0 + (vec3(1.0) - vR0) * pow( 1.0 - NdotV, 5.0 ) * pow( fGloss, 20.0 );',
            '}',
            '',
            // === 太阳方向 (来自 P_Malin) ===
            'vec3 GetSunDir() { return normalize( vec3( -1.0, 0.7, 0.25 ) ); }',
            '',
            // === 天空颜色 (来自 P_Malin) ===
            'vec3 GetSkyColour( vec3 vRayDir ) {',
            '    vec3 skyColour = vec3(0.1, 0.5, 1.0);',
            '    vec3 bgUp = skyColour * 4.0;',
            '    vec3 bgDown = skyColour * 6.0;',
            '    vec3 vSkyColour = mix( bgDown, bgUp, clamp( vRayDir.y, 0.0, 1.0 ) );',
            '    float fSunDotV = dot(GetSunDir(), vRayDir);',
            '    float fDirDot = clamp(fSunDotV * 0.5 + 0.5, 0.0, 1.0);',
            '    vec3 sunColour = vec3(1.0, 0.85, 0.5) * 5.0;',
            '    vSkyColour += sunColour * (1.0 - exp2(fDirDot * -0.5)) * 2.0;',
            '    return vSkyColour;',
            '}',
            '',
            // === 主材质函数 ===
            'czm_material czm_getMaterial(czm_materialInput materialInput) {',
            '    czm_material m = czm_getDefaultMaterial(materialInput);',
            '    vec2 st = materialInput.st;',
            '',
            '    float t = u_time * u_flowSpeed;',
            '',
            '    // === 河道形状 ===',
            '    float meander = sin(st.t * 8.0 + t * 0.7) * 0.06',
            '                  + sin(st.t * 3.5 + t * 0.4) * 0.04',
            '                  + cos(st.t * 13.0 - t * 0.5) * 0.025;',
            '    float distToCenter = abs(st.s - 0.5 - meander);',
            '    float bankWidth = 0.35 + u_turbulence * 0.08;',
            '    float bankFade = 1.0 - smoothstep(bankWidth - 0.18, bankWidth, distToCenter);',
            '',
            '    if (bankFade <= 0.01) {',
            '        m.diffuse = vec3(0.0);',
            '        m.alpha = 0.0;',
            '        return m;',
            '    }',
            '',
            '    // === 流速场 (P_Malin 风格) ===',
            '    // 主流方向沿 st.t (河道方向)，加上蜿蜒偏移',
            '    vec2 vFlowRate = vec2( cos(st.t * 5.0 + t) * u_turbulence * 0.3,',
            '                          1.0 + u_turbulence * 0.5 );',
            '    vFlowRate *= u_flowSpeed * 0.3;',
            '',
            '    // === 泡沫量 (基于流速和河岸) ===',
            '    float fFoam = 0.0;',
            '    float fFoamScale1 = 0.5;',
            '    float fFoamCutoff = 0.4;',
            '    float fFoamScale2 = 0.35;',
            '    fFoam = length(vFlowRate) * fFoamScale1;',
            '    fFoam += clamp( fFoam - fFoamCutoff, 0.0, 1.0 );',
            '    float fDist = distToCenter;',
            '    fFoam = 1.0 - pow( fDist, fFoam * fFoamScale2 );',
            '    // 河岸泡沫',
            '    fFoam += pow(1.0 - bankFade, 2.0) * 1.5;',
            '    fFoam = clamp( (fFoam - 0.2) * 1.5, 0.0, 1.0 );',
            '    fFoam = fFoam * fFoam * 0.5;',
            '    fFoam *= u_foamAmount;',
            '',
            '    // === 水面法线 (P_Malin 双采样流混合) ===',
            '    float fWaterFoamTex = 1.0;',
            '    vec4 vWaterNormalAndHeight = SampleFlowingNormal( st, vFlowRate, fFoam, t, fWaterFoamTex );',
            '    vec3 vWaterNormal = vWaterNormalAndHeight.xyz;',
            '',
            '    // 转换到 Cesium 法线空间',
            '    float ws = u_waveAmp * (0.6 + u_turbulence * 0.4);',
            '    vec3 n = materialInput.normalEC;',
            '    n.x += vWaterNormal.x * ws * 2.0;',
            '    n.y += vWaterNormal.z * ws * 2.0;',  // 注意：z 在 P_Malin 代码中是 "上" 方向',
            '    m.normal = normalize(n);',
            '',
            '    // === 水体颜色 (P_Malin 消散色 + 深度渐变) ===',
            '    float fWaterDepth = u_waterDepth * (0.7 + vWaterNormalAndHeight.w * 0.3);',
            '',
            '    // 深水 → 浅水渐变 (P_Malin 风格的消散色)',
            '    vec3 deepColor    = vec3(0.01, 0.03, 0.08);',
            '    vec3 midColor     = vec3(0.03, 0.12, 0.25);',
            '    vec3 shallowColor = vec3(0.06, 0.28, 0.45);',
            '    vec3 surfaceColor = vec3(0.10, 0.45, 0.60);',
            '',
            '    vec3 vWaterColor = mix(deepColor, midColor, smoothstep(0.1, 0.4, fWaterDepth));',
            '    vWaterColor = mix(vWaterColor, shallowColor, smoothstep(0.3, 0.7, fWaterDepth));',
            '    vWaterColor = mix(vWaterColor, surfaceColor, vWaterNormalAndHeight.w * 0.4);',
            '',
            '    // 应用消散色',
            '    vec3 vExtinction = GetWaterExtinction( fWaterDepth * 2.0 );',
            '    vWaterColor *= vExtinction;',
            '    vWaterColor += (1.0 - vExtinction) * vec3(0.02, 0.08, 0.15);',
            '',
            '    // === 天空反射 (P_Malin Fresnel) ===',
            '    vec3 vViewDir = vec3(0.0, 0.0, 1.0);',  // 简化视角',
            '    vec3 vR0 = vec3(0.01);',
            '    float fGloss = 0.95;',
            '    vec3 vFresnel = GetFresnel( vViewDir, m.normal, vR0, fGloss );',
            '',
            '    vec3 vReflectDir = reflect( -vViewDir, m.normal );',
            '    vec3 vReflectLight = GetSkyColour( vReflectDir );',
            '',
            '    vWaterColor = mix(vWaterColor, vReflectLight, vFresnel * 0.6);',
            '',
            '    // === 太阳高光 (P_Malin 风格) ===',
            '    vec3 vSunDir = GetSunDir();',
            '    vec3 vH = normalize( vViewDir + vSunDir );',
            '    float fNdotH = max( 0.0, dot( m.normal, vH ) );',
            '    float fSpecular = pow( fNdotH, 80.0 ) * 3.0;',
            '    vWaterColor += vec3(1.0, 0.85, 0.5) * fSpecular;',
            '',
            '    // === 泡沫混合 (P_Malin 风格) ===',
            '    float fFoamBlend = 1.0 - pow( fWaterFoamTex, fFoam * 5.0 );',
            '    vec3 foamColor = vec3(0.85, 0.88, 0.92);',
            '    vWaterColor = mix(vWaterColor, foamColor * 0.8, fFoamBlend );',
            '',
            '    // === 色调映射 (P_Malin Tonemap) ===',
            '    vWaterColor = Tonemap(vWaterColor * 3.0);',
            '    vWaterColor = vWaterColor * 1.1 - 0.1;',
            '',
            '    m.diffuse = vWaterColor;',
            '    m.alpha = u_alpha * (0.6 + bankFade * 0.4);',
            '    m.specular = 0.3 + (1.0 - fFoamBlend) * 0.5;',
            '    m.shininess = 30.0;',
            '',
            '    return m;',
            '}'
        ].join('\n');

        var riverMaterial = new Cesium.Material({
            fabric: {
                type: 'RiverWater3D',
                uniforms: {
                    u_time: 0.0,
                    u_flowSpeed: 1.0,
                    u_turbulence: 0.7,
                    u_waveAmp: 0.6,
                    u_waterDepth: 0.55,
                    u_alpha: 0.85,
                    u_foamAmount: 0.6
                },
                source: glslSource
            },
            translucent: true
        });

        log('✅ 材质创建成功 (P_Malin 移植版)');

        // ============================================================
        // 长江三峡中心线
        // ============================================================
        const centerline = [
            [106.55, 29.56], [106.68, 29.60], [106.85, 29.67],
            [107.00, 29.72], [107.20, 29.77], [107.40, 29.76],
            [107.55, 29.72], [107.52, 29.80], [107.50, 29.88],
            [107.65, 29.92], [107.80, 29.94], [107.95, 29.98],
            [108.10, 30.02], [108.25, 30.08], [108.38, 30.16],
            [108.45, 30.25], [108.55, 30.32], [108.70, 30.40],
            [108.88, 30.48], [109.05, 30.56], [109.25, 30.62],
            [109.45, 30.68], [109.60, 30.71], [109.78, 30.75],
            [109.95, 30.78], [110.12, 30.81], [110.28, 30.84],
            [110.45, 30.87], [110.65, 30.88], [110.85, 30.86],
            [111.05, 30.82], [111.22, 30.76], [111.30, 30.70]
        ];

        const riverWidthDeg = 0.022;
        var geometryInstances = [];

        for (let i = 0; i < centerline.length - 1; i++) {
            const p1 = centerline[i];
            const p2 = centerline[i + 1];
            const dx = p2[0] - p1[0];
            const dy = p2[1] - p1[1];
            const len = Math.sqrt(dx * dx + dy * dy) || 0.0001;
            const nx = -dy / len * riverWidthDeg;
            const ny = dx / len * riverWidthDeg;
            const t = i / centerline.length;
            let w = 1.0;
            if (t > 0.3 && t < 0.7) w = 0.65;
            if (t > 0.45 && t < 0.6) w = 0.45;

            var positions = Cesium.Cartesian3.fromDegreesArray([
                p1[0] + nx * w, p1[1] + ny * w,
                p1[0] - nx * w, p1[1] - ny * w,
                p2[0] - nx * w, p2[1] - ny * w,
                p2[0] + nx * w, p2[1] + ny * w,
            ]);

            geometryInstances.push(new Cesium.GeometryInstance({
                geometry: new Cesium.PolygonGeometry({
                    polygonHierarchy: new Cesium.PolygonHierarchy(positions),
                }),
            }));
        }

        // 乌江支流
        const wujiang = [
            [107.55, 29.72], [107.60, 29.62], [107.58, 29.52],
            [107.53, 29.43], [107.46, 29.36]
        ];
        for (let i = 0; i < wujiang.length - 1; i++) {
            const p1 = wujiang[i]; const p2 = wujiang[i + 1];
            const dx = p2[0] - p1[0]; const dy = p2[1] - p1[1];
            const len = Math.sqrt(dx * dx + dy * dy) || 0.0001;
            const nx = -dy / len * riverWidthDeg * 0.42;
            const ny = dx / len * riverWidthDeg * 0.42;
            geometryInstances.push(new Cesium.GeometryInstance({
                geometry: new Cesium.PolygonGeometry({
                    polygonHierarchy: new Cesium.PolygonHierarchy(Cesium.Cartesian3.fromDegreesArray([
                        p1[0] + nx, p1[1] + ny, p1[0] - nx, p1[1] - ny,
                        p2[0] - nx, p2[1] - ny, p2[0] + nx, p2[1] + ny,
                    ])),
                }),
            }));
        }

        var riverPrimitive = viewer.scene.primitives.add(
            new Cesium.GroundPrimitive({
                geometryInstances: geometryInstances,
                appearance: new Cesium.MaterialAppearance({
                    material: riverMaterial,
                    translucent: true,
                }),
            })
        );

        log(`已创建 ${geometryInstances.length} 段河流`);

        // ============================================================
        // 动画
        // ============================================================
        const startTime = performance.now() / 1000;
        viewer.scene.preRender.addEventListener(function() {
            var elapsed = (performance.now() / 1000) - startTime;
            if (riverMaterial && riverMaterial.uniforms) {
                riverMaterial.uniforms.u_time = elapsed;
            }
        });

        // ============================================================
        // 相机
        // ============================================================
        window.flyToRiver = function() {
            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(108.6, 30.4, 45000),
                orientation: { heading: Cesium.Math.toRadians(40), pitch: Cesium.Math.toRadians(-45), roll: 0 },
                duration: 3.0
            });
        };
        window.flyLowAngle = function() {
            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(109.5, 30.72, 8000),
                orientation: { heading: Cesium.Math.toRadians(60), pitch: Cesium.Math.toRadians(-18), roll: 0 },
                duration: 3.0
            });
        };
        window.flyTopDown = function() {
            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(108.5, 30.2, 80000),
                orientation: { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 },
                duration: 2.5
            });
        };

        // ============================================================
        // UI
        // ============================================================
        const uiMap = {
            'flowSpeed': 'u_flowSpeed', 'turbulence': 'u_turbulence',
            'waveAmp': 'u_waveAmp', 'waterDepth': 'u_waterDepth',
            'alpha': 'u_alpha', 'foamAmount': 'u_foamAmount',
        };
        Object.keys(uiMap).forEach(function(id) {
            var slider = document.getElementById(id);
            var key = uiMap[id];
            slider.addEventListener('input', function() {
                var v = parseFloat(slider.value);
                if (riverMaterial && riverMaterial.uniforms) riverMaterial.uniforms[key] = v;
            });
        });

        setTimeout(function() { log('飞行到三峡...'); flyToRiver(); }, 2000);
        window.__river3d = { viewer: viewer, material: riverMaterial };
    })();
    </script>
</body>
</html>
